<!doctype html>
<html lang="en">
  <head>
    <title>Sign In — FurEver Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/auth.css" />
  </head>
  <body class="auth-page">
    <div class="auth-split">
      <!-- LEFT PANEL -->
      <div class="auth-panel">
        <a href="index.html" class="auth-logo">
          <div class="logo-circle">🐾</div>
          <span>FurEver Home</span>
        </a>

        <div class="auth-form-wrap">
          <h1>Welcome Back</h1>
          <p class="auth-sub">Sign in to continue finding furry friends.</p>

          <!-- ✅ UPDATED FORM -->
          <form class="auth-form" onsubmit="return validateForm();">
            
            <div class="field-row">
              <label for="email-input">
                <span class="field-icon">@</span>
              </label>
              <input
                type="text"
                id="email-input"
                name="email"
                placeholder="Email address"
              />
            </div>
            <small id="email-error" style="color:red;"></small>

            <div class="field-row">
              <label for="password-input">
                <span class="field-icon">🔒</span>
              </label>
              <input
                type="password"
                id="password-input"
                name="password"
                placeholder="Password"
              />
            </div>
            <small id="password-error" style="color:red;"></small>

            <div class="form-meta">
              <label class="remember-me">
                <input type="checkbox" /> Remember me
              </label>
              <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-lg auth-submit">
              Sign In →
            </button>
          </form>

          <p class="auth-switch">
            Don't have an account? <a href="register.html">Register here</a>
          </p>
        </div>
      </div>

      <!-- RIGHT DECORATIVE PANEL -->
      <div class="auth-deco">
        <div class="deco-content">
          <div class="deco-emoji-grid">
            <span>🐕</span><span>🐈</span> <span>🐇</span><span>🦜</span>
            <span>🐩</span><span>🐾</span>
          </div>
          <h2>"Every pet has a story.<br />Be part of theirs."</h2>
          <p>
            1,240+ pets have found their forever homes through FurEver Home.
          </p>
        </div>
      </div>
    </div>

    <!--javascript-->
    <script>
      function validateForm() {
        let email = document.getElementById("email-input").value;
        let password = document.getElementById("password-input").value;

        let emailError = document.getElementById("email-error");
        let passwordError = document.getElementById("password-error");

        // clear old errors
        emailError.innerHTML = "";
        passwordError.innerHTML = "";

        let isValid = true;

        // EMAIL CHECK
        if (email === "") {
          emailError.innerHTML = "Email is required";
          isValid = false;
        } else if (!email.includes("@") || !email.includes(".")) {
          emailError.innerHTML = "Enter a valid email";
          isValid = false;
        }

        // PASSWORD CHECK
        if (password === "") {
          passwordError.innerHTML = "Password is required";
          isValid = false;
        } else if (password.length < 6) {
          passwordError.innerHTML = "Password must be at least 6 characters";
          isValid = false;
        }

        return isValid;
      }
    </script>
  </body>
</html>
