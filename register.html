<!doctype html>
<html lang="en">
  <head>
    <title>Register — FurEver Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/auth.css" />
    <style>
      /* Validation border colours */
      .field-row.error {
        border-color: #e53e3e;
      }
      .field-row.success {
        border-color: #38a169;
      }
      .field-row.error label {
        background-color: #fff5f5;
      }
      .field-row.success label {
        background-color: #f0fff4;
      }

      /* Inline error text */
      .field-error {
        font-size: 0.78rem;
        color: #e53e3e;
        margin-top: -2px;
        margin-left: 2px;
        min-height: 16px;
        display: block;
      }

      /* Password strength bar */
      .strength-wrap {
        margin-top: -2px;
        margin-bottom: 2px;
      }
      .strength-bar-bg {
        height: 4px;
        background: #f0e8d8;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 3px;
      }
      .strength-bar {
        height: 100%;
        width: 0%;
        border-radius: 4px;
        transition:
          width 0.3s,
          background-color 0.3s;
      }
      .strength-text {
        font-size: 0.75rem;
        color: #7a6a5a;
      }

      .strength-wrap.weak .strength-bar {
        width: 33%;
        background: #e53e3e;
      }
      .strength-wrap.medium .strength-bar {
        width: 66%;
        background: #d97706;
      }
      .strength-wrap.strong .strength-bar {
        width: 100%;
        background: #38a169;
      }
      .strength-wrap.weak .strength-text {
        color: #e53e3e;
      }
      .strength-wrap.medium .strength-text {
        color: #d97706;
      }
      .strength-wrap.strong .strength-text {
        color: #38a169;
      }
    </style>
  </head>
  <body class="auth-page">
    <div class="auth-split">
      <!-- LEFT PANEL -->
      <div class="auth-panel">
        <a href="index.html" class="auth-logo">
          <div class="logo-circle">🐾</div>
          <span>FurEver Home</span>
        </a>

        <div class="auth-form-wrap">
          <h1>Create Account</h1>
          <p class="auth-sub">
            Join thousands of pet lovers finding their furever match.
          </p>

          <!-- novalidate disables browser defaults; our JS handles everything -->
          <form class="auth-form" id="register-form" novalidate>
            <!-- First Name -->
            <div class="field-row" id="firstname-row">
              <label for="firstname-input"
                ><span class="field-icon">👤</span></label
              >
              <input
                type="text"
                id="firstname-input"
                name="firstname"
                placeholder="First Name"
              />
            </div>
            <span class="field-error" id="firstname-error"></span>

            <!-- Last Name (optional) -->
            <div class="field-row" id="lastname-row">
              <label for="lastname-input"
                ><span class="field-icon">👤</span></label
              >
              <input
                type="text"
                id="lastname-input"
                name="lastname"
                placeholder="Last Name (optional)"
              />
            </div>
            <span class="field-error" id="lastname-error"></span>

            <!-- Email -->
            <div class="field-row" id="email-row">
              <label for="email-input"><span class="field-icon">@</span></label>
              <input
                type="email"
                id="email-input"
                name="email"
                placeholder="Email address"
              />
            </div>
            <span class="field-error" id="email-error"></span>

            <!-- Password -->
            <div class="field-row" id="password-row">
              <label for="password-input"
                ><span class="field-icon">🔒</span></label
              >
              <input
                type="password"
                id="password-input"
                name="password"
                placeholder="Password"
              />
            </div>
            <span class="field-error" id="password-error"></span>
            <!-- Strength bar — hidden until user starts typing -->
            <div class="strength-wrap" id="strength-wrap" style="display: none">
              <div class="strength-bar-bg">
                <div class="strength-bar" id="strength-bar"></div>
              </div>
              <span class="strength-text" id="strength-text"></span>
            </div>

            <!-- Confirm Password -->
            <div class="field-row" id="confirm-row">
              <label for="repeat-password-input"
                ><span class="field-icon">🔒</span></label
              >
              <input
                type="password"
                id="repeat-password-input"
                name="repeat-password"
                placeholder="Confirm Password"
              />
            </div>
            <span class="field-error" id="confirm-error"></span>

            <!-- Account Type -->
            <div class="account-type">
              <p class="account-type-label">I want to:</p>
              <div class="account-type-options">
                <label class="type-option selected">
                  <input
                    type="radio"
                    name="account-type"
                    value="adopt"
                    checked
                  />
                  <span class="type-icon">🏠</span>
                  <span>Adopt a Pet</span>
                </label>
                <label class="type-option">
                  <input type="radio" name="account-type" value="rescue" />
                  <span class="type-icon">🤝</span>
                  <span>List / Rescue</span>
                </label>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg auth-submit">
              Create Account →
            </button>
          </form>

          <p class="auth-switch">
            Already have an account? <a href="login.html">Sign in</a>
          </p>
        </div>
      </div>

      <!-- RIGHT DECORATIVE PANEL -->
      <div class="auth-deco">
        <div class="deco-content">
          <div class="deco-emoji-grid">
            <span>🐕</span><span>🐈</span> <span>🐇</span><span>🦜</span>
            <span>🐩</span><span>🐾</span>
          </div>
          <h2>"Every pet has a story.<br />Be part of theirs."</h2>
          <p>
            1,240+ pets have found their forever homes through FurEver Home.
          </p>
        </div>
      </div>
    </div>

    <script>
      function showError(rowId, errorId, message) {
        document.getElementById(rowId).classList.add("error");
        document.getElementById(rowId).classList.remove("success");
        document.getElementById(errorId).textContent = message;
      }

      function showSuccess(rowId, errorId) {
        document.getElementById(rowId).classList.add("success");
        document.getElementById(rowId).classList.remove("error");
        document.getElementById(errorId).textContent = "";
      }

      function clearState(rowId, errorId) {
        document.getElementById(rowId).classList.remove("error", "success");
        document.getElementById(errorId).textContent = "";
      }

      function validateFirstName() {
        const val = document.getElementById("firstname-input").value.trim();
        if (val === "") {
          showError(
            "firstname-row",
            "firstname-error",
            "⚠ First name is required.",
          );
          return false;
        }
        if (val.length < 2) {
          showError(
            "firstname-row",
            "firstname-error",
            "⚠ Must be at least 2 characters.",
          );
          return false;
        }
        if (!/^[a-zA-Z\s'\-]+$/.test(val)) {
          showError(
            "firstname-row",
            "firstname-error",
            "⚠ Only letters, spaces, hyphens and apostrophes allowed.",
          );
          return false;
        }
        showSuccess("firstname-row", "firstname-error");
        return true;
      }

      function validateLastName() {
        const val = document.getElementById("lastname-input").value.trim();
        if (val === "") {
          clearState("lastname-row", "lastname-error");
          return true;
        }
        if (!/^[a-zA-Z\s'\-]+$/.test(val)) {
          showError(
            "lastname-row",
            "lastname-error",
            "⚠ Only letters, spaces, hyphens and apostrophes allowed.",
          );
          return false;
        }
        showSuccess("lastname-row", "lastname-error");
        return true;
      }

      function validateEmail() {
        const val = document.getElementById("email-input").value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
        if (val === "") {
          showError("email-row", "email-error", "⚠ Email address is required.");
          return false;
        }
        if (!emailRegex.test(val)) {
          showError(
            "email-row",
            "email-error",
            "⚠ Enter a valid email (e.g. you@example.com).",
          );
          return false;
        }
        showSuccess("email-row", "email-error");
        return true;
      }

      function validatePassword() {
        const val = document.getElementById("password-input").value;
        if (val === "") {
          showError(
            "password-row",
            "password-error",
            "⚠ Password is required.",
          );
          document.getElementById("strength-wrap").style.display = "none";
          return false;
        }
        if (val.length < 8) {
          showError(
            "password-row",
            "password-error",
            "⚠ Password must be at least 8 characters.",
          );
          return false;
        }
        showSuccess("password-row", "password-error");
        return true;
      }

      function validateConfirm() {
        const pass = document.getElementById("password-input").value;
        const confirm = document.getElementById("repeat-password-input").value;
        if (confirm === "") {
          showError(
            "confirm-row",
            "confirm-error",
            "⚠ Please confirm your password.",
          );
          return false;
        }
        if (pass !== confirm) {
          showError(
            "confirm-row",
            "confirm-error",
            "⚠ Passwords do not match.",
          );
          return false;
        }
        showSuccess("confirm-row", "confirm-error");
        return true;
      }

      document
        .getElementById("password-input")
        .addEventListener("input", function () {
          const val = this.value;
          const wrap = document.getElementById("strength-wrap");
          const label = document.getElementById("strength-text");

          if (val.length === 0) {
            wrap.style.display = "none";
            return;
          }
          wrap.style.display = "block";

          let score = 0;
          if (val.length >= 8) score++; // length
          if (/[A-Z]/.test(val)) score++; // uppercase letter
          if (/[0-9]/.test(val)) score++; // number
          if (/[^a-zA-Z0-9]/.test(val)) score++; // special character

          wrap.classList.remove("weak", "medium", "strong");
          if (score <= 1) {
            wrap.classList.add("weak");
            label.textContent = "Weak — add uppercase, numbers or symbols";
          } else if (score <= 3) {
            wrap.classList.add("medium");
            label.textContent = "Medium — getting stronger!";
          } else {
            wrap.classList.add("strong");
            label.textContent = "Strong password ✓";
          }
        });

      document
        .getElementById("firstname-input")
        .addEventListener("blur", validateFirstName);
      document
        .getElementById("lastname-input")
        .addEventListener("blur", validateLastName);
      document
        .getElementById("email-input")
        .addEventListener("blur", validateEmail);
      document
        .getElementById("password-input")
        .addEventListener("blur", validatePassword);
      document
        .getElementById("repeat-password-input")
        .addEventListener("blur", validateConfirm);

      // Re-validate confirm whenever password itself changes
      document
        .getElementById("password-input")
        .addEventListener("input", function () {
          if (document.getElementById("repeat-password-input").value !== "")
            validateConfirm();
        });

      document
        .getElementById("register-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const allValid = [
            validateFirstName(),
            validateLastName(),
            validateEmail(),
            validatePassword(),
            validateConfirm(),
          ].every(Boolean);

          if (!allValid) return;

          alert("Account created successfully!");

          this.reset();

          document
            .querySelectorAll(".field-row")
            .forEach((row) => row.classList.remove("success"));
          document
            .querySelectorAll(".field-error")
            .forEach((err) => (err.textContent = ""));
          document.getElementById("strength-wrap").style.display = "none";
        });

      document.querySelectorAll(".type-option").forEach((opt) => {
        opt.addEventListener("click", () => {
          document
            .querySelectorAll(".type-option")
            .forEach((o) => o.classList.remove("selected"));
          opt.classList.add("selected");
        });
      });
    </script>
  </body>
</html>
