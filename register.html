<!doctype html>
<html>
  <head>
    <title>Sign up</title>
    <link rel="stylesheet" href="/styles/register.css" />
  </head>
  <body>
    <div class="wrapper">
      <h1>Signup</h1>
      <form>
        <div class="incorrect">
          <label for="firstname-input">
            <img src="/images/icons/person.svg" />
          </label>
          <input
            type="text"
            name="firstname"
            id="firstname-input"
            placeholder="FirstName"
          />
        </div>

        <div>
          <label for="email-input">
            <span>@</span>
          </label>
          <input
            type="email"
            name="email"
            id="email-input"
            placeholder="Email"
          />
        </div>

        <div>
          <label for="password-input">
            <img src="/images/icons/lock.svg" />
          </label>
          <input
            type="password"
            name="password"
            id="password-input"
            placeholder="Password"
          />
        </div>

        <div>
          <label for="password-input">
            <img src="/images/icons/lock.svg" />
          </label>
          <input
            type="password"
            name="repeat-password"
            id="repeat-password-input"
            placeholder="Confirm Password"
          />
        </div>

        <button type="submit">Signup</button>
      </form>

      <p>Already have an Account? <a href="login.html">Login</a></p>
    </div>
  </body>
</html>
